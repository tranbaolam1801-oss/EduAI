<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduAI - Điều hướng giao diện</title>
    <link rel="shortcut icon" href="" type="image/x-icon" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./assets/css/base.css" />
    <link rel="stylesheet" href="./assets/css/layout.css" />
    <link rel="stylesheet" href="./assets/css/components.css" />
    <link rel="stylesheet" href="./assets/css/responsive.css" />
    <style>
      .landing-page {
        display: grid;
        place-items: center;
        min-height: 100vh;
        padding: 24px;
      }

      .landing-card {
        width: min(760px, 100%);
        padding: 32px;
        border-radius: 28px;
        border: 1px solid rgba(160, 178, 255, 0.14);
        background: linear-gradient(135deg, rgba(77, 48, 211, 0.94), rgba(13, 23, 58, 0.92)), radial-gradient(circle at top right, rgba(69, 200, 255, 0.18), transparent 22%);
        box-shadow: 0 26px 60px rgba(2, 6, 18, 0.55);
      }

      .landing-card h1,
      .landing-card p {
        margin: 0;
      }

      .landing-card h1 {
        margin-top: 10px;
        font-family: "Sora", sans-serif;
        font-size: clamp(2rem, 4vw, 3rem);
      }

      .landing-links {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 14px;
        margin-top: 22px;
      }
    </style>
  </head>
  <body class="landing-page">
    <main class="landing-card">
      <p class="eyebrow">EduAI Web</p>
      <h1>Đang chuyển hướng đến giao diện phù hợp</h1>
      <p class="section-subtitle">Nếu bạn đã đăng nhập, hệ thống sẽ mở dashboard. Nếu chưa, hệ thống sẽ chuyển đến trang khởi tạo hành trình.</p>

      <div class="landing-links">
        <a class="primary-button" href="./pages/dashboard.html">Mở dashboard</a>
        <a class="secondary-button" href="./pages/onboarding.html">Mở onboarding</a>
        <a class="secondary-button" href="./pages/resources.html">Mở tài liệu học tập</a>
      </div>
    </main>

    <script type="module">
      const token = window.localStorage.getItem("eduai_access_token");
      window.setTimeout(() => {
        window.location.href = token ? "./pages/dashboard.html" : "./pages/onboarding.html";
      }, 900);
    </script>
  </body>
</html>
