services:
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      PORT: 3000
      NODE_ENV: production
      CLIENT_ORIGIN: http://localhost:8080
      BACKEND_API_BASE_PATH: /api/v1
      AI_SERVICE_URL: http://ai-service:8000
      DB_HOST: ${DOCKER_DB_HOST:-host.docker.internal}
      DB_PORT: ${DOCKER_DB_PORT:-1433}
      DB_NAME: ${DOCKER_DB_NAME:-AI_LearningCareerDB}
      DB_USER: ${DOCKER_DB_USER:-sa}
      DB_PASSWORD: ${DOCKER_DB_PASSWORD:-your_sql_server_password}
      DB_ENCRYPT: ${DOCKER_DB_ENCRYPT:-false}
      DB_TRUST_SERVER_CERTIFICATE: ${DOCKER_DB_TRUST_SERVER_CERTIFICATE:-true}
    volumes:
      - ./storage:/workspace/storage
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  ai-service:
    build:
      context: .
      dockerfile: docker/ai-service/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      BACKEND_API_URL: http://backend:3000/api/v1
    depends_on:
      - backend
    restart: unless-stopped

  frontend-web:
    build:
      context: .
      dockerfile: docker/frontend-web/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend
      - ai-service
    restart: unless-stopped

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    profiles:
      - sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
      MSSQL_SA_PASSWORD: ${DOCKER_DB_PASSWORD:-your_sql_server_password}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    restart: unless-stopped

volumes:
  sqlserver_data:
