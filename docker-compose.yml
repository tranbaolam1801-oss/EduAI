services:
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./storage:/storage
    restart: unless-stopped

  ai-service:
    build:
      context: .
      dockerfile: docker/ai-service/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped

  frontend-web:
    build:
      context: .
      dockerfile: docker/frontend-web/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend
      - ai-service
    restart: unless-stopped
